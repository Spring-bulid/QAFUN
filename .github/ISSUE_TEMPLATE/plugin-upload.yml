## 上传方式

1. 将你的插件目录（包含 `main.ts`、`info.prop`、`desc.txt`）打包为 zip
2. 将 zip 文件作为附件拖拽到本 Issue（GitHub 支持 Issue 附件）
3. 提交 Issue

仓库所有者审核后，会将插件合并到 `plugins/` 目录并更新 `plugins/list.json`，届时用户可在 QAFUN 插件市场直接下载安装。

### 插件目录结构示例

```
my_plugin/
├── main.ts      # TypeScript 插件主文件
├── info.prop    # 插件信息（name, author, version, desc）
└── desc.txt     # 简短描述
```
